<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>유튜브 영상 설명 페이지</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f4f7fb;
      color: #222;
    }
    .container {
      max-width: 1000px;
      margin: 40px auto;
      padding: 20px;
    }
    .video-box {
      background: #fff;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 8px 24px rgba(0,0,0,0.08);
    }
    .video-frame {
      width: 100%;
      aspect-ratio: 16 / 9;
      border: 0;
      display: block;
      background: #000;
    }
    .video-preview {
      position: relative;
      display: block;
      width: 100%;
      background: #000;
      cursor: pointer;
      text-decoration: none;
    }
    .video-preview img {
      width: 100%;
      display: block;
      aspect-ratio: 16 / 9;
      object-fit: cover;
    }
    .play-button {
      position: absolute;
      inset: 0;
      margin: auto;
      width: 74px;
      height: 74px;
      border-radius: 50%;
      background: rgba(255, 0, 0, 0.9);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 8px 24px rgba(0,0,0,0.3);
    }
    .play-button::after {
      content: "";
      width: 0;
      height: 0;
      border-top: 14px solid transparent;
      border-bottom: 14px solid transparent;
      border-left: 24px solid white;
      margin-left: 6px;
    }
    .video-frame {
      width: 100%;
      aspect-ratio: 16 / 9;
      border: 0;
      display: block;
      background: #000;
    }
    .description {
      padding: 24px;
    }
    .title {
      font-size: 24px;
      margin: 0 0 12px;
    }
    .meta {
      color: #666;
      margin-bottom: 16px;
      font-size: 14px;
    }
    .desc-text {
      line-height: 1.7;
      margin-bottom: 20px;
    }
    .tags {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 20px;
    }
    .tag {
      background: #eef3ff;
      color: #335cce;
      padding: 6px 10px;
      border-radius: 999px;
      font-size: 13px;
      font-weight: bold;
    }
    .info-card {
      background: #fafafa;
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      padding: 16px;
    }
    .info-card h3 {
      margin-top: 0;
      margin-bottom: 8px;
      font-size: 18px;
    }
    .video-note {
      padding: 12px 16px 0;
      font-size: 14px;
      color: #555;
    }
    .video-note a {
      color: #335cce;
      font-weight: bold;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="video-box">
<video
        class="video-frame"
        controls
        playsinline
        preload="metadata"
      >
        <source src="summer.mp4" type="video/mp4" />
        이 브라우저는 동영상 재생을 지원하지 않습니다.
      </video>

      <img src="summer.jpg" style="width: 100%; display: block;" alt="summer" />
    </div>

  </div>
</body>
</html>
