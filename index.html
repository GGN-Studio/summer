<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>유튜브 영상 설명 페이지</title>
  <meta property="og:title" content="유튜브 영상 설명 페이지" />
  <meta property="og:image" content="https://ggn-studio.github.io/summer/summer_qr.png" />
  <meta property="og:url" content="https://ggn-studio.github.io/summer/index.html" />
  <meta property="og:type" content="website" />
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f4f7fb;
      color: #222;
    }
    .container {
      max-width: 1000px;
      margin: 0 auto;
      padding: 20px;
    }
    .video-box {
      border-radius: 16px;
      overflow: hidden;
    }
    .video-frame {
      width: 100%;
      aspect-ratio: 16 / 9;
      border: 0;
      display: block;
      background: #000;
    }

    /* 이미지 클릭 → 전체화면 오버레이 */
    .thumb-img {
      width: 100%;
      display: block;
      cursor: pointer;
    }
    .lightbox {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.92);
      z-index: 9999;
      align-items: center;
      justify-content: center;
    }
    .lightbox.open {
      display: flex;
    }
    .lightbox img {
      max-width: 95vw;
      max-height: 95vh;
      object-fit: contain;
      border-radius: 8px;
    }
    .lightbox-close {
      position: absolute;
      top: -60px;
      right: 0;
      background: rgba(255,255,255,0.15);
      border: 2px solid rgba(255,255,255,0.6);
      color: #fff;
      font-size: 22px;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      line-height: 1;
    }
    .lightbox-close:hover {
      background: rgba(255,255,255,0.3);
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="video-box">
      <video
        class="video-frame"
        controls
        playsinline
        preload="metadata"
        poster="thumb.png"
      >
        <source src="summer.mp4" type="video/mp4" />
        이 브라우저는 동영상 재생을 지원하지 않습니다.
      </video>

      <img class="thumb-img" src="summer.jpg" alt="summer" onclick="openLightbox()" />
      <p style="text-align: right; font-size: 12px; color: #888; margin: 6px 0 10px;">* 이미지 클릭시 크게 볼 수 있습니다.</p>
    </div>
  </div>

  <!-- 전체화면 이미지 오버레이 -->
  <div class="lightbox" id="lightbox" onclick="closeLightbox()">
    <div style="position: relative; display: inline-block;" onclick="event.stopPropagation()">
      <button class="lightbox-close" onclick="closeLightbox()">&#x2715;</button>
      <img src="zoom.png" alt="summer" />
    </div>
  </div>

  <script>
    function openLightbox() {
      document.getElementById('lightbox').classList.add('open');
    }
    function closeLightbox() {
      document.getElementById('lightbox').classList.remove('open');
    }
    document.addEventListener('keydown', function(e) {
      if (e.key === 'Escape') closeLightbox();
    });
  </script>
</body>
</html>
